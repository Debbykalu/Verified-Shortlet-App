<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book affordable accommodation We Offer verified Booking,  Reservations, Bespoke airport transfer Packages & Much More. Book..." >
	<meta name="robot" content="noindex, nofollow">
	<meta name="author" content="Debby Sinkalu">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link href="bootstrap/css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
	<link href="main.css" rel="stylesheet">
    <title>Registration</title>
</head>
<body>
    <div class="container">
        <div class="card register-card mx-auto my-5">
            <div class="card-header">
                <h2 class="logo-title">
                    Debkits Shortlet
                </h2>
                <p class="mb-0">
                    Create your account
                </p>
            </div>
            <div class="card-body p-4">
                <form action="">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Firt Name</label>
                            <input type="text" name="fname" class="form-control" placeholder="Enter your first name">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="lname" class="form-control" placeholder="Enter your last name">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="text" name="email" class="form-control" placeholder="Enter your email">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phonenum" class="form-control" placeholder="Enter your phone number">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Password</label>
                            <input type="text" name="pwd" class="form-control" placeholder="Enter your Password">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="text" name="confpwd" class="form-control" placeholder="Confirm Password">
                        </div>
                        <div class="col-md-12 mb-4">
                            <label class="form-label">Profile Picture(Optional)</label>
                            <input type="file" name="profileimage" class="form-control">
                        </div>
                        <div class="col-md-12 mb-4">
                            <div class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label">I agree to the Terms & Conditions</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="searchbtn">
                                Create Account
                        </button>
                    </div>
                </form>
                <div class="text-center">
                    Already have an account?
                    <a href="login.html" class="text-decoration-none fw-bold">Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
