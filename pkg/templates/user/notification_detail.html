{% extends "user/layout.html" %}

{% block main_content %}

<div class="container py-5 mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-body p-5">

                    <div class="mb-4">

                        <i class="fa-solid fa-{{ notification.notification_icon }} fa-3x text-primary"></i>

                    </div>

                    <h2>

                        {{ notification.notification_title }}

                    </h2>

                    <p class="text-muted">

                        {{ time_ago(notification.notification_timecreated) }}

                    </p>

                    <hr>

                    <p class="fs-5">

                        {{ notification.notification_message }}

                    </p>

                    <div class="mt-4">

                        <a
                        href="{{ action.url }}"
                        class="btn btn-primary">

                            {{ action.text }}

                        </a>

                        <a
                        href="{{ url_for('notification.all_notifications') }}"
                        class="btn btn-outline-secondary">

                            Back

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
