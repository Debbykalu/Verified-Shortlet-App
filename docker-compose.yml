services:

  flask:
    build: .
    container_name: verified_shortlet_app

    restart: unless-stopped

    env_file:
      - .env

    # The service name resolves inside the Compose network. Local Flask
    # commands use 127.0.0.1 from .env instead.
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306

    depends_on:
      mysql:
        condition: service_healthy

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - shortlet_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql:

    image: mysql:8.0.40

    container_name: verified_shortlet_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shortletdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appuserpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}

    volumes:
      - mysql_data:/var/lib/mysql

    # Bind only to the local machine for `python starter.py` and Flask CLI.
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - shortlet_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:

    image: nginx:1.27.3

    container_name: verified_shortlet_nginx

    restart: unless-stopped

    depends_on:
      - flask

    ports:
      - "80:80"

    volumes:
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./deployment/nginx/certs:/etc/letsencrypt
      - ./pkg/static:/app/pkg/static:ro

    networks:
      - shortlet_network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:

networks:
  shortlet_network:
    driver: bridge
